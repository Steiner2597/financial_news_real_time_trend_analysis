crawler_control:
  loop_interval: 600
  individual_intervals:
    reddit: 600
    newsapi: 900
    rss: 600
    stocktwits: 600
    twitter: 1800
    alphavantage: 900
  request_delays:
    reddit: 0.5
    newsapi: 1
    rss: 1
    stocktwits: 1
    twitter: 2
    alphavantage: 12
data_management:
  archive:
    compress: true
    enabled: true
    format: parquet
    retention_days: 90
  auto_export:
    enabled: true
    memory_threshold_mb: 900
    queue_threshold: 1000
    time_interval_minutes: 1440
  export_dir: data_exports
logging:
  backup_count: 5
  level: INFO
  log_dir: logs
  max_log_size_mb: 100
newsapi:
  api_key: 00b4d0f09e164c47a1511a4e33c90385
  articles_per_keyword: 25
  enabled: true
  query_keywords:
  - '"Apple Inc" AND (iPhone OR earnings OR stock)'
  - '"Tesla" AND (electric vehicle OR Elon Musk OR stock)'
  - '"Nvidia" AND (AI OR chip OR semiconductor)'
  - '"Google" AND (Alphabet OR earnings OR stock)'
  - '"Meta" AND (Facebook OR earnings OR stock)'
  - '"Dow Jones" OR "DJIA"'
  - '"Nasdaq" OR "NASDAQ 100"'
  - '"S&P 500" OR "SPX"'
  - '"Federal Reserve" OR "interest rates" OR "Fed meeting"'
  - '"inflation" AND (CPI OR economy OR rising)'
  - '"Bitcoin" AND (crypto OR cryptocurrency OR BTC)'
  - '"Ethereum" AND (crypto OR ETH OR blockchain)'
  - '"earnings report" OR "quarterly earnings"'
  - '"IPO" OR "initial public offering"'
  - '"merger" OR "acquisition" OR "M&A"'
  - '"stock market crash" OR "market volatility"'
  - '"oil prices" OR "crude oil" OR "energy"'
  - '"gold prices" OR "precious metals"'
  rate_limits:
    current_day_requests: 10
    last_reset_date: '2025-11-02'
    max_requests_per_day: 100
    requests_per_run: 5
  sources: []
reddit:
  client_id: w5wC_cZ1ecdMML8ksYug5Q
  client_secret: qsCVvxt8X0RP6K3UIL7VSH6s6aS90w
  comments_limit: 30
  comments_sort: best
  post_filters:
    min_upvotes: 1
    min_comments: 1
  enabled: true
  posts_limit: 50
  max_post_age_hours: 24        # 🔥 只抓取最近 N 小时内的帖子（避免抓到旧数据，推荐 12-48）
  
  # 🔥 实时流式监听配置（循环模式下自动启动）
  stream_enabled: true          # 是否启用实时流监听（持续监听直到手动停止）
  
  subreddits:
  - investing
  - finance
  - stocks
  - wallstreetbets
  - StockMarket
  - wallstreet
  - ValueInvesting
  - Ebay
  - RealEstate
  - housing
  - Apartmentliving
  - povertyfinance
  - Entrepreneur
  - startups
  - worldnews
  - news
  - technology
  - nottheonion
  - science
  - AITAH
  search_enabled: true
  search_keywords: [
    # Earnings season / Performance
    "earnings", "quarterly results", "revenue beat", "EPS", "guidance raised", "profit margin",
    "guidance cut", "guidance lowered", "forward guidance miss", "earnings call",
    "earnings preview", "pre-earnings runup", "revenue slowdown", "profit margin squeeze",
    "weak outlook",

    # IPOs & Listings
    "IPO", "direct listing", "SPAC merger", "going public", "Biotech IPO",

    # Stock events
    "stock split", "reverse split", "dividend announcement", "buyback program", "insider trading",
    "layoffs announced", "workforce reduction", "hiring freeze", "headcount cut",
    "executive shakeup", "board changes",

    # M&A / Corporate actions
    "merger deal", "acquisition", "M&A", "spinoff", "divestiture",

    # Market moves
    "market correction", "bull run", "bear market", "rally", "selloff", "crash", "circuit breaker",
    "market meltdown", "risk-off", "risk-on", "volatility spike", "VIX surge",
    "soft landing", "hard landing", "stagflation", "disinflation", "reflation trade",
    "flight to safety", "capital flight", "margin liquidation", "forced selling",

    # Options / Flow / Technical
    "options flow", "dark pool activity", "dark pool print", "unusual volume", "block trade",
    "sweep order", "high short interest", "short squeeze brewing", "whale activity",
    "breakout level", "breakdown", "max pain", "gamma exposure",

    # Individual stocks
    "$AAPL", "$TSLA", "$NVDA", "$MSFT", "$GOOGL", "$AMZN", "$META", "$NFLX",

    # Crypto
    "Bitcoin surge", "BTC pump", "Ethereum", "crypto rally", "altcoin", "DeFi",
    "ETF approval crypto", "BTC halving", "Bitcoin ETF flows",
    "on-chain activity", "whale wallet", "ETH staking", "token unlock",
    "miner capitulation", "protocol upgrade", "airdrop", "rug pull",

    # Fed / Central banks
    "Fed rate hike", "FOMC meeting", "Powell speech", "interest rate cut", "QE", "tapering",
    "unexpected rate move", "emergency rate action",

    # Economic indicators
    "inflation", "CPI data", "unemployment rate", "GDP growth", "consumer confidence", "PMI",
    "unexpected CPI", "sticky inflation", "disinflation trend",

    # Crisis / risk
    "recession signals", "yield curve", "bank crisis", "debt ceiling", "credit rating downgrade",
    "banking system stress", "sovereign debt crisis", "currency collapse", "flash crash",
    "market panic", "global liquidity crunch", "bailout talks", "capital controls",

    # AI / Tech / Industry themes
    "AI breakthrough", "chip shortage", "supply chain", "oil price shock", "housing market",
    "AI chip demand", "GPU shortage", "AI arms race", "semiconductor export control",
    "advanced packaging", "battery breakthrough", "robotaxi approval",

    # Regulation & legal
    "SEC investigation", "antitrust", "lawsuit", "regulatory approval", "fine",
    "SEC crypto regulation", "GDPR fines", "money laundering crackdown",
    "FATF travel rule", "crypto ban discussion", "Congress hearing",
    "AI safety regulation", "national security review",

    # CEO / corporate drama
    "CEO resignation", "whistleblower", "earnings miss", "profit warning", "bankruptcy filing",

    # Geopolitical events
    "Ukraine war", "Russia sanctions", "Israel-Gaza conflict", "Middle East tensions",
    "Taiwan Strait", "South China Sea dispute", "Iran nuclear deal", "NATO expansion",
    "China-US trade war", "US-China tech decoupling", "cyber warfare",

    # Global macro (multi-country economic data)
    "US GDP growth", "US inflation report", "US unemployment claims", "US PCE inflation", "US consumer spending",
    "Eurozone inflation", "Germany recession", "ECB rate decision", "UK CPI data", "Eurozone PMI",
    "China manufacturing PMI", "Japan BoJ policy", "India GDP growth", "South Korea trade surplus", "ASEAN economic outlook",
    "Brazil inflation", "Nigeria currency crisis", "Turkey interest rates", "Argentina debt default", "South Africa rand",

    # Commodities / Energy
    "OPEC meeting", "natural gas shortage", "Brent crude price", "gold rally",
    "lithium price surge", "rare earth supply", "nuclear power plant",
    "copper supply chain", "Ukraine grain exports", "Russia energy exports",

    # Climate / disasters
    "Hurricane Ian", "California wildfires", "Australian drought", "Monsoon floods",
    "climate change policy", "extreme weather insurance", "food inflation",
    "supply chain disruption", "flood damage cost", "wildfire economic impact",

    # Trade / policies
    "US-China tech war", "Belt and Road Initiative", "ASEAN trade agreement",
    "African Continental Free Trade", "EU carbon border tax", "US tariff on EVs",
    "digital tax EU", "global minimum corporate tax", "debt relief initiative",
    "trade war escalation",

    # Emerging markets & regional hotspots
    "Brazil election", "Mexico trade deal", "Venezuela oil production",
    "Saudi Vision 2030", "UAE financial center", "OPEC+ agreement",
    "Vietnam manufacturing shift", "Indonesia nickel export", "Thailand tourism recovery",
    "Nigeria oil price", "South Africa power crisis", "Kenya fintech boom",

    # Combo triggers (event + impact)
    "Fed rate hike China impact", "Ukraine war oil prices", "AI regulation EU",
    "Saudi Arabia oil output", "US-China tech decoupling", "Brazil inflation currency",
    "Nigeria debt restructuring", "EU crypto tax", "India manufacturing growth", "Mexico remittance flow",

    # ⚡️ Market breaking triggers / News
    "breaking finance", "market alert", "trade war escalation",
    "emergency meeting", "asset freeze", "liquidity injection",

    # Meme / WSB slang
    "diamond hands", "paper hands", "YOLO trade", "bagholder", "tendies",
    "ape buy", "moon mission", "to the moon", "HODL", "dead cat bounce",
    "exit liquidity", "rekt", "buy the dip", "sell the news"
  ]
  search_settings:
    # ⚠️ Reddit 搜索 API 限制：索引延迟8-24小时，无法获取真正实时数据
    # 建议：改用 'day' 或 'week'，'hour' 经常返回空结果
    time_filter: day     # 时间范围: hour|day|week|month|year|all
    sort: new            # 排序: new|hot|relevance|top|comments
    posts_per_keyword: 15  # 每个关键词抓取15条
  user_agent: FinanceDataCrawler/1.0
